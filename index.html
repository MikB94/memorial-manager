<script>
const SUPABASE_URL='https://ohymvreppuatepssyzku.supabase.co';
const SUPABASE_KEY='sb_publishable_e4jn19h7nQqu1ru6URis-w_uQxwNNPg';
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const GROUPS=['A','B','C','D'];
const COLORS={A:'#f2c14e',B:'#45a3ff',C:'#58d37a',D:'#bd72ff'};
const NAV=[['dashboard','DASHBOARD'],['teams','SQUADRE E GIRONI'],['calendar','CALENDARIO'],['results','RISULTATI'],['standings','CLASSIFICHE'],['knockout','FASE FINALE'],['graphics','GRAFICHE SOCIAL']];
const DB='memorial_manager_2026_v1',STORE='project',KEY='main';
let currentPage='dashboard', editingMatchId=null, liveMatchId=null, graphicMode='match', graphicRef=null;
const GROUP_DATES=['2026-07-23','2026-07-24','2026-07-27','2026-07-28','2026-07-29','2026-07-30','2026-07-31','2026-08-03','2026-08-04','2026-08-05'];

const TIMES=['21:00','21:45','22:30','23:15'];
function baseState(){return{version:1,settings:{name:'XXIV Memorial Giuliano Di Donato',start:'2026-07-23',end:'2026-08-12',pointsWin:3,fieldCount:1,matchesPerNight:4,tieBreak:['points','wins','setDiff','setsWon','headToHead']},teams:Array.from({length:20},(_,i)=>({id:'t'+(i+1),name:'Squadra '+String(i+1).padStart(2,'0'),img:'',group:null,slot:null})),matches:[],knockoutGenerated:false,updatedAt:new Date().toISOString()}}
let state=baseState();
function esc(s=''){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
async function dbSave(){state.updatedAt=new Date().toISOString();const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(state,KEY);tx.oncomplete=res;tx.onerror=()=>rej(tx.error)})}
async function dbLoad(){try{const db=await openDB();return await new Promise((res,rej)=>{const r=db.transaction(STORE,'readonly').objectStore(STORE).get(KEY);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}catch{return null}}
async function persist(msg='Salvato'){document.getElementById('saveState').textContent='Salvataggio…';await dbSave();renderAll();document.getElementById('saveState').textContent=msg;setTimeout(()=>document.getElementById('saveState').textContent='Salvataggio automatico',1300)}
function normalize(data){if(!data||!Array.isArray(data.teams))throw new Error('Formato non valido');const out=baseState();out.settings={...out.settings,...(data.settings||{})};out.teams=data.teams.slice(0,20).map((t,i)=>({id:'t'+(i+1),name:String(t.name||('Squadra '+(i+1))),img:typeof t.img==='string'?t.img:'',group:GROUPS.includes(t.group)?t.group:null,slot:Number.isInteger(t.slot)?t.slot:null}));while(out.teams.length<20){const i=out.teams.length;out.teams.push({id:'t'+(i+1),name:'Squadra '+String(i+1).padStart(2,'0'),img:'',group:null,slot:null})}out.matches=Array.isArray(data.matches)?data.matches:[];out.knockoutGenerated=!!data.knockoutGenerated;return out}
function team(id){return state.teams.find(t=>t.id===id)}
function teamName(id){return team(id)?.name||'Da definire'}
function teamThumb(id){const t=team(id);return `<span class="mini-thumb">${t?.img?`<img src="${t.img}" alt="">`:''}</span>`}
function teamLabel(id){return `<span class="mini-team">${teamThumb(id)}<span>${esc(teamName(id))}</span></span>`}
function fmtDate(d){return new Intl.DateTimeFormat('it-IT',{weekday:'long',day:'2-digit',month:'long'}).format(new Date(d+'T12:00:00')).replace(/^./,c=>c.toUpperCase())}
function getGroupTeams(g){return state.teams.filter(t=>t.group===g).sort((a,b)=>(a.slot??99)-(b.slot??99))}
function groupComplete(){return GROUPS.every(g=>getGroupTeams(g).length===5)}
function roundRobin(ids){const arr=[...ids];if(arr.length%2)arr.push(null);const n=arr.length,rounds=[];for(let r=0;r<n-1;r++){const pairs=[];for(let i=0;i<n/2;i++){const a=arr[i],b=arr[n-1-i];if(a&&b)pairs.push([a,b])}rounds.push(pairs);arr.splice(1,0,arr.pop())}return rounds}
function newMatch(id,stage,date,time,home,away,group=null,round=null){return{id,stage,date,time,home,away,group,round,status:'scheduled',sets:[{h:null,a:null},{h:null,a:null},{h:null,a:null}],live:{h:0,a:0,set:1},winner:null,notes:''}}
function generateCalendar(){if(!groupComplete()){toast('Completa prima tutti i gironi.');return}if(state.matches.some(m=>m.stage==='GROUP')&&!confirm('Rigenerare il calendario? I risultati della fase a gironi verranno cancellati.'))return;state.matches=state.matches.filter(m=>m.stage!=='GROUP'&&m.stage!=='QF'&&m.stage!=='SF'&&m.stage!=='F');const rounds={};for(const g of GROUPS)rounds[g]=roundRobin(getGroupTeams(g).map(t=>t.id));const plan=[['A',0,'B',0],['C',0,'D',0],['A',1,'C',1],['B',1,'D',1],['A',2,'D',2],['B',2,'C',2],['A',3,'B',3],['C',3,'D',3],['A',4,'B',4],['C',4,'D',4]];let seq=1;plan.forEach((p,nightIndex)=>{let slot=0;for(let k=0;k<4;k+=2){const g=p[k],r=p[k+1];for(const pair of rounds[g][r]){state.matches.push(newMatch('G'+String(seq++).padStart(2,'0'),'GROUP',GROUP_DATES[nightIndex],TIMES[slot++],pair[0],pair[1],g,r+1))}}});state.knockoutGenerated=false;persist('Calendario generato')}
function matchResult(m){const played=m.sets.filter(s=>Number.isFinite(s.h)&&Number.isFinite(s.a));let hs=0,as=0;played.forEach(s=>{if(s.h>s.a)hs++;else if(s.a>s.h)as++});return{hs,as,played}}
function isMatchComplete(m){const r=matchResult(m);return r.hs===2||r.as===2}
function standings(g){const ids=getGroupTeams(g).map(t=>t.id),rows=ids.map(id=>({id,p:0,w:0,l:0,sw:0,sl:0,sd:0,played:0}));const map=Object.fromEntries(rows.map(r=>[r.id,r]));for(const m of state.matches.filter(m=>m.stage==='GROUP'&&m.group===g&&m.status==='done')){const r=matchResult(m);if(!map[m.home]||!map[m.away])continue;map[m.home].played++;map[m.away].played++;map[m.home].sw+=r.hs;map[m.home].sl+=r.as;map[m.away].sw+=r.as;map[m.away].sl+=r.hs;if(r.hs>r.as){map[m.home].w++;map[m.home].p+=state.settings.pointsWin;map[m.away].l++}else{map[m.away].w++;map[m.away].p+=state.settings.pointsWin;map[m.home].l++}}
 rows.forEach(r=>r.sd=r.sw-r.sl);rows.sort((a,b)=>b.p-a.p||b.w-a.w||b.sd-a.sd||b.sw-a.sw||headToHead(b.id,a.id,g)||teamName(a.id).localeCompare(teamName(b.id)));return rows}
function headToHead(a,b,g){const m=state.matches.find(m=>m.stage==='GROUP'&&m.group===g&&m.status==='done'&&((m.home===a&&m.away===b)||(m.home===b&&m.away===a)));if(!m)return 0;return m.winner===a?1:m.winner===b?-1:0}
function generateKnockout(){if(!GROUPS.every(g=>standings(g).length===5)){toast('Gironi incompleti.');return}const allGroupDone=state.matches.filter(m=>m.stage==='GROUP').every(m=>m.status==='done');if(!allGroupDone&&!confirm('Ci sono partite dei gironi non concluse. Generare comunque la fase finale con la classifica attuale?'))return;state.matches=state.matches.filter(m=>!['QF','SF','F'].includes(m.stage));const q=[['A',0,'B',1],['C',0,'D',1],['B',0,'A',1],['D',0,'C',1]];q.forEach((x,i)=>state.matches.push(newMatch('QF'+(i+1),'QF',KO_DATES.QF,TIMES[i],standings(x[0])[x[1]].id,standings(x[2])[x[3]].id,null,1)));state.matches.push(newMatch('SF1','SF',KO_DATES.SF,'21:30',null,null,null,1));state.matches.push(newMatch('SF2','SF',KO_DATES.SF,'22:30',null,null,null,1));state.matches.push(newMatch('F1','F',KO_DATES.F,'22:00',null,null,null,1));state.knockoutGenerated=true;propagateKnockout();persist('Fase finale generata')}
function propagateKnockout(){const q=state.matches.filter(m=>m.stage==='QF').sort((a,b)=>a.id.localeCompare(b.id)),sf=state.matches.filter(m=>m.stage==='SF').sort((a,b)=>a.id.localeCompare(b.id)),f=state.matches.find(m=>m.stage==='F');if(sf[0]){sf[0].home=q[0]?.winner||null;sf[0].away=q[1]?.winner||null}if(sf[1]){sf[1].home=q[2]?.winner||null;sf[1].away=q[3]?.winner||null}if(f){f.home=sf[0]?.winner||null;f.away=sf[1]?.winner||null}}

function renderDashboard(){const groupMatches=state.matches.filter(m=>m.stage==='GROUP'),done=groupMatches.filter(m=>m.status==='done').length,next=state.matches.filter(m=>m.status==='scheduled').sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))[0];document.getElementById('page-dashboard').innerHTML=`<div class="grid four"><div class="card kpi"><span>Squadre</span><strong>${state.teams.filter(t=>t.group).length}/20</strong></div><div class="card kpi"><span>Partite gironi</span><strong>${done}/${groupMatches.length||40}</strong></div><div class="card kpi"><span>Serate cuscinetto</span><strong>2</strong></div><div class="card kpi"><span>Finale</span><strong>12/08</strong></div></div><div class="grid two" style="margin-top:14px"><div class="card"><h2>Prossima partita</h2>${next?`<p>${fmtDate(next.date)} · ${next.time}</p><div class="vs"><div class="team">${esc(teamName(next.home))}</div><strong>VS</strong><div class="team">${esc(teamName(next.away))}</div></div><div style="margin-top:14px"><button class="btn gold" onclick="openReadOnlyMatch('${next.id}')">VEDI PARTITA</button></div>`:'<p class="empty">Nessuna partita programmata.</p>'}</div><div class="card"><h2>Struttura calendario consigliata</h2><p>Gironi dal 23 luglio al 5 agosto: 4 partite a sera.</p><p>6 e 7 agosto: serate libere per meteo o recuperi.</p><p>Quarti 10 agosto · Semifinali 11 agosto · Finale 12 agosto.</p></div></div>`}

function renderCalendar(){document.getElementById('page-calendar').innerHTML=`<div class="section-head"><h2>Calendario torneo</h2><span class="readonly-note">SOLA CONSULTAZIONE</span></div><div class="calendar-grid">${nightsData().map(n=>`<section class="night ${n.reserve?'reserve':''}"><div class="night-head"><span>${fmtDate(n.date)}</span><span>${n.reserve?'SERATA CUSCINETTO':n.matches.length+' PARTITE'}</span></div><div class="matches">${n.matches.length?n.matches.map(matchTile).join(''):`<div class="empty" style="padding:8px">${n.reserve?'Disponibile per recuperi o rinvii':'Nessuna partita programmata'}</div>`}</div></section>`).join('')}</div>`}
function renderResults(){const matches=state.matches.filter(m=>m.status==='done').sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));document.getElementById('page-results').innerHTML=`<div class="section-head"><h2>Risultati</h2></div><div class="card"><div class="table-wrap"><table><thead><tr><th>Data</th><th>Fase</th><th>Partita</th><th>Set</th></tr></thead><tbody>${matches.length?matches.map(m=>{const r=matchResult(m);return `<tr><td>${fmtDate(m.date)} ${m.time}</td><td>${m.stage==='GROUP'?'Girone '+m.group:m.stage}</td><td>${teamLabel(m.home)} &nbsp; ${r.hs}–${r.as} &nbsp; ${teamLabel(m.away)}</td><td>${r.played.map(s=>s.h+'-'+s.a).join(' · ')}</td></tr>`}).join(''):'<tr><td colspan="4" class="empty">Nessun risultato inserito.</td></tr>'}</tbody></table></div></div>`}
function renderStandings(){document.getElementById('page-standings').innerHTML=`<div class="section-head"><h2>Classifiche</h2></div><div class="standings-grid">${GROUPS.map(g=>`<div class="card"><h3 style="color:${COLORS[g]}">GIRONE ${g}</h3><div class="table-wrap"><table><thead><tr><th>#</th><th>Squadra</th><th>G</th><th>V</th><th>P</th><th>SV</th><th>SP</th><th>+/-</th><th>PT</th></tr></thead><tbody>${standings(g).map((r,i)=>`<tr class="rank${i+1}"><td>${i+1}</td><td>${teamLabel(r.id)}</td><td>${r.played}</td><td>${r.w}</td><td>${r.l}</td><td>${r.sw}</td><td>${r.sl}</td><td>${r.sd>0?'+':''}${r.sd}</td><td><strong>${r.p}</strong></td></tr>`).join('')}</tbody></table></div></div>`).join('')}</div>`}
function renderLive(){const upcoming=state.matches.filter(m=>m.status!=='done'&&m.status!=='postponed'&&m.home&&m.away).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));document.getElementById('page-live').innerHTML=`<div class="section-head"><h2>Segnapunti</h2></div><div class="grid three">${upcoming.slice(0,12).map(m=>`<div class="card"><div class="small-note">${fmtDate(m.date)} · ${m.time}</div><h3>${esc(teamName(m.home))} vs ${esc(teamName(m.away))}</h3><button class="btn gold" onclick="openLiveModal('${m.id}')">APRI SEGNAPUNTI</button></div>`).join('')||'<div class="card empty">Nessuna partita disponibile.</div>'}</div>`}

function renderGraphics(){const options=state.matches.filter(m=>m.home&&m.away).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));if(!graphicRef&&options[0])graphicRef=options[0].id;document.getElementById('page-graphics').innerHTML=`<div class="section-head"><h2>Grafiche social</h2><span class="small-note">Apri a schermo intero e fai uno screenshot.</span></div><div class="graphics-toolbar"><button class="btn ${graphicMode==='match'?'gold':''}" onclick="setGraphic('match')">SFIDA</button><button class="btn ${graphicMode==='result'?'gold':''}" onclick="setGraphic('result')">RISULTATO</button><button class="btn ${graphicMode==='schedule'?'gold':''}" onclick="setGraphic('schedule')">PROGRAMMA SERATA</button><button class="btn ${graphicMode==='standings'?'gold':''}" onclick="setGraphic('standings')">CLASSIFICA</button><select id="graphicSelect" onchange="graphicRef=this.value;renderGraphics()">${graphicMode==='standings'?GROUPS.map(g=>`<option value="${g}" ${graphicRef===g?'selected':''}>Girone ${g}</option>`).join(''):graphicMode==='schedule'?GROUP_DATES.concat(RESERVED_DATES,KO_DATES.QF,KO_DATES.SF,KO_DATES.F).map(d=>`<option value="${d}" ${graphicRef===d?'selected':''}>${fmtDate(d)}</option>`).join(''):options.map(m=>`<option value="${m.id}" ${graphicRef===m.id?'selected':''}>${fmtDate(m.date)} · ${teamName(m.home)} vs ${teamName(m.away)}</option>`).join('')}</select><button class="btn" onclick="document.getElementById('graphicStage').requestFullscreen()">APRI FULLSCREEN</button></div><div class="graphic-stage" id="graphicStage">${renderSocialCard()}</div>`;setTimeout(fitSocialCard,0)}

iv class="match-vs">${isResult&&m.status==='done'?r.hs+'–'+r.as:'VS'}</div><div class="match-card"><div class="poster">${team(m.away)?.img?`<img src="${team(m.away).img}">`:''}</div><h3>${esc(teamName(m.away))}</h3></div></div><div class="social-footer">${isResult&&m.status==='done'?r.played.map(s=>s.h+'–'+s.a).join(' · '):m.stage==='GROUP'?'GIRONE '+m.group:m.stage}</div></div>`}

function openMatchModal(id){const m=state.matches.find(x=>x.id===id);if(!m)return;editingMatchId=id;document.getElementById('matchModalTitle').textContent=teamName(m.home)+' vs '+teamName(m.away);document.getElementById('matchModalBody').innerHTML=`<div class="grid two"><div class="field"><label>Data</label><input id="mDate" type="date" value="${m.date}"></div><div class="field"><label>Orario</label><input id="mTime" type="time" value="${m.time}"></div></div><div style="margin-top:16px"><div class="set-grid"><span></span><strong>${esc(teamName(m.home))}</strong><strong>${esc(teamName(m.away))}</strong></div>${[0,1,2].map((i)=>`<div class="set-grid"><strong>SET ${i+1}</strong><input id="sh${i}" type="number" min="0" value="${m.sets[i]?.h??''}"><input id="sa${i}" type="number" min="0" value="${m.sets[i]?.a??''}"></div>`).join('')}</div><div class="field" style="margin-top:12px"><label>Stato</label><select id="mStatus"><option value="scheduled" ${m.status==='scheduled'?'selected':''}>Da giocare</option><option value="live" ${m.status==='live'?'selected':''}>In corso</option><option value="done" ${m.status==='done'?'selected':''}>Terminata</option><option value="postponed" ${m.status==='postponed'?'selected':''}>Rinviata</option></select></div><div class="row" style="justify-content:flex-end;margin-top:16px"><button class="btn" onclick="closeMatchModal()">ANNULLA</button><button class="btn gold" onclick="saveMatch()">SALVA PARTITA</button></div>`;document.getElementById('matchModal').classList.add('show')}

async function saveMatch(){const m=state.matches.find(x=>x.id===editingMatchId);if(!m)return;m.date=document.getElementById('mDate').value;m.time=document.getElementById('mTime').value;m.status=document.getElementById('mStatus').value;m.sets=[0,1,2].map(i=>{const h=document.getElementById('sh'+i).value,a=document.getElementById('sa'+i).value;return{h:h===''?null:Number(h),a:a===''?null:Number(a)}});const r=matchResult(m);if(m.status==='done'){if(!(r.hs===2||r.as===2)){toast('Per terminare la partita servono 2 set vinti.');return}m.winner=r.hs>r.as?m.home:m.away}else m.winner=null;if(['QF','SF','F'].includes(m.stage))propagateKnockout();closeMatchModal();await persist('Partita salvata')}

function livePoint(side,delta){const m=state.matches.find(x=>x.id===liveMatchId);m.live[side]=Math.max(0,m.live[side]+delta);renderLiveModal();dbSave()}
async function finishLiveSet(){const m=state.matches.find(x=>x.id===liveMatchId);if(m.live.h===m.live.a){toast('Il set non può finire in parità.');return}const idx=m.live.set-1;m.sets[idx]={h:m.live.h,a:m.live.a};m.live={h:0,a:0,set:m.live.set+1};const r=matchResult(m);if(r.hs===2||r.as===2){m.status='done';m.winner=r.hs>r.as?m.home:m.away;if(['QF','SF','F'].includes(m.stage))propagateKnockout();closeLiveModal();await persist('Risultato salvato')}else{renderLiveModal();await dbSave()}}

async function loadPublicState(showToast=false){
 const badge=document.getElementById('saveState');if(badge)badge.textContent='Aggiornamento…';
 const {data,error}=await supabaseClient.from('tournament_state').select('data,updated_at').eq('id','main').maybeSingle();
 if(error){if(badge)badge.textContent='Errore dati';if(showToast)toast('Errore caricamento: '+error.message);return}
 if(!data){if(badge)badge.textContent='Nessun dato pubblicato';if(showToast)toast('Nessun aggiornamento ancora pubblicato');return}
 try{state=normalize(data.data);renderAll();const d=new Date(data.updated_at||state.updatedAt);if(badge)badge.textContent='Aggiornato '+d.toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});if(showToast)toast('Dati aggiornati')}catch(e){if(badge)badge.textContent='Dati non validi'}
}
function saveProject(){const blob=new Blob([JSON.stringify(state)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='memorial_manager_2026.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
document.getElementById('openProject').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{try{state=normalize(JSON.parse(r.result));await persist('Progetto caricato')}catch(err){toast('File non valido o danneggiato.')}e.target.value=''};r.readAsText(f)};
function importDraw(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async()=>{try{const d=JSON.parse(r.result);const n=normalize(d);state.teams=n.teams;await persist('Sorteggio importato')}catch{toast('Backup del sorteggio non valido.')}e.target.value=''};r.readAsText(f)}
async function resetAll(){if(!confirm('Azzera squadre, calendario e risultati?'))return;state=baseState();await persist('Progetto azzerato')}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function fitSocialCard(){
 const stage=document.getElementById('graphicStage');
 const card=stage?.querySelector('.social-card');
 if(!stage||!card)return;
 if(window.innerWidth<=800){
   const scale=Math.min((stage.clientWidth-16)/1080,1);
   card.style.zoom=String(scale);
 }else{
   card.style.zoom='';
 }
}
window.addEventListener('resize',fitSocialCard);
(async()=>{renderAll();await loadPublicState();fitSocialCard();setInterval(()=>loadPublicState(false),60000)})();
</script>
